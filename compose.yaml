# Root compose file — pulls each submodule's prod compose into one project.
# Requires Docker Compose CLI >= 2.20.0 for the `include:` directive.
# Each included file uses its co-located <submodule>/.env (generated by
# scripts/setup-env.sh from the root .env).
#
# Run with `docker compose up --build` (or `make prod`).

include:
  - tiles-processor/docker-compose.yaml
  - data-service/docker-compose.yaml
  - alerts-service/docker-compose.yaml
  - visualizer/docker-compose.yml
